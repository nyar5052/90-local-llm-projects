<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7209b7"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a4a"/>
      <stop offset="100%" style="stop-color:#1e1e3a"/>
    </linearGradient>
    <linearGradient id="engineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a1a5e"/>
      <stop offset="100%" style="stop-color:#2a1048"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#7209b7" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="bold">ARCHITECTURE OVERVIEW</text>

  <!-- Row 1: User Input -->
  <rect x="30" y="48" width="150" height="70" rx="8" fill="url(#boxGrad)" stroke="#7209b7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="105" y="68" text-anchor="middle" fill="#7209b7" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">📥 USER INPUT</text>
  <text x="105" y="84" text-anchor="middle" fill="#c0c0d0" font-family="Segoe UI,Arial,sans-serif" font-size="9">Topic</text>
  <text x="105" y="96" text-anchor="middle" fill="#c0c0d0" font-family="Segoe UI,Arial,sans-serif" font-size="9">Duration · Style</text>
  <text x="105" y="108" text-anchor="middle" fill="#c0c0d0" font-family="Segoe UI,Arial,sans-serif" font-size="9">Audience</text>

  <!-- Arrow 1 -->
  <line x1="180" y1="83" x2="210" y2="83" stroke="#7209b7" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Row 1: CLI / Web UI -->
  <rect x="215" y="48" width="130" height="70" rx="8" fill="url(#boxGrad)" stroke="#555580" stroke-width="1" filter="url(#shadow)"/>
  <text x="280" y="68" text-anchor="middle" fill="#e0e0f0" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">🖥️ INTERFACE</text>
  <text x="280" y="84" text-anchor="middle" fill="#a0a0c0" font-family="Segoe UI,Arial,sans-serif" font-size="9">cli.py (Click)</text>
  <text x="280" y="96" text-anchor="middle" fill="#a0a0c0" font-family="Segoe UI,Arial,sans-serif" font-size="9">web_ui.py (Streamlit)</text>
  <text x="280" y="108" text-anchor="middle" fill="#a0a0c0" font-family="Segoe UI,Arial,sans-serif" font-size="9">Rich Terminal Output</text>

  <!-- Arrow 2 -->
  <line x1="345" y1="83" x2="375" y2="83" stroke="#7209b7" stroke-width="2"/>

  <!-- Row 1: Script Engine -->
  <rect x="380" y="48" width="180" height="70" rx="8" fill="url(#engineGrad)" stroke="#7209b7" stroke-width="2" filter="url(#shadow)"/>
  <text x="470" y="68" text-anchor="middle" fill="#c990f0" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">⚙️ SCRIPT ENGINE</text>
  <text x="470" y="84" text-anchor="middle" fill="#b0b0d0" font-family="Segoe UI,Arial,sans-serif" font-size="9">build_prompt()</text>
  <text x="470" y="96" text-anchor="middle" fill="#b0b0d0" font-family="Segoe UI,Arial,sans-serif" font-size="9">generate_script()</text>
  <text x="470" y="108" text-anchor="middle" fill="#b0b0d0" font-family="Segoe UI,Arial,sans-serif" font-size="9">generate_scene_breakdown()</text>

  <!-- Arrow 3 -->
  <line x1="560" y1="83" x2="590" y2="83" stroke="#7209b7" stroke-width="2"/>

  <!-- Row 1: Output -->
  <rect x="595" y="48" width="175" height="70" rx="8" fill="url(#boxGrad)" stroke="#555580" stroke-width="1" filter="url(#shadow)"/>
  <text x="682" y="68" text-anchor="middle" fill="#e0e0f0" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">📤 OUTPUT</text>
  <text x="682" y="84" text-anchor="middle" fill="#a0a0c0" font-family="Segoe UI,Arial,sans-serif" font-size="9">VideoScript dataclass</text>
  <text x="682" y="96" text-anchor="middle" fill="#a0a0c0" font-family="Segoe UI,Arial,sans-serif" font-size="9">ScriptSection objects</text>
  <text x="682" y="108" text-anchor="middle" fill="#a0a0c0" font-family="Segoe UI,Arial,sans-serif" font-size="9">Markdown Export</text>

  <!-- Row 2: Content Generators (center, larger) -->
  <rect x="100" y="150" width="600" height="80" rx="8" fill="url(#engineGrad)" stroke="#7209b7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="172" text-anchor="middle" fill="#c990f0" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🎯 CONTENT GENERATORS</text>

  <!-- Generator boxes inside -->
  <rect x="120" y="182" width="130" height="36" rx="5" fill="#1e1e3a" stroke="#533483" stroke-width="1"/>
  <text x="185" y="197" text-anchor="middle" fill="#b0b0d0" font-family="Segoe UI,Arial,sans-serif" font-size="9">generate_hook()</text>
  <text x="185" y="210" text-anchor="middle" fill="#808098" font-family="Segoe UI,Arial,sans-serif" font-size="8">Opening options</text>

  <rect x="265" y="182" width="130" height="36" rx="5" fill="#1e1e3a" stroke="#533483" stroke-width="1"/>
  <text x="330" y="197" text-anchor="middle" fill="#b0b0d0" font-family="Segoe UI,Arial,sans-serif" font-size="9">suggest_broll()</text>
  <text x="330" y="210" text-anchor="middle" fill="#808098" font-family="Segoe UI,Arial,sans-serif" font-size="8">Visual overlays</text>

  <rect x="410" y="182" width="135" height="36" rx="5" fill="#1e1e3a" stroke="#533483" stroke-width="1"/>
  <text x="477" y="197" text-anchor="middle" fill="#b0b0d0" font-family="Segoe UI,Arial,sans-serif" font-size="9">generate_thumbnail_ideas()</text>
  <text x="477" y="210" text-anchor="middle" fill="#808098" font-family="Segoe UI,Arial,sans-serif" font-size="8">Thumbnail concepts</text>

  <rect x="560" y="182" width="120" height="36" rx="5" fill="#1e1e3a" stroke="#533483" stroke-width="1"/>
  <text x="620" y="197" text-anchor="middle" fill="#b0b0d0" font-family="Segoe UI,Arial,sans-serif" font-size="9">SYSTEM_PROMPT</text>
  <text x="620" y="210" text-anchor="middle" fill="#808098" font-family="Segoe UI,Arial,sans-serif" font-size="8">Scriptwriter persona</text>

  <!-- Vertical connectors Row1 → Row2 -->
  <line x1="470" y1="118" x2="470" y2="150" stroke="#7209b7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="280" y1="118" x2="280" y2="150" stroke="#555580" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Row 3: Post-Processing -->
  <rect x="100" y="262" width="600" height="75" rx="8" fill="url(#boxGrad)" stroke="#555580" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="284" text-anchor="middle" fill="#e0e0f0" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🔧 POST-PROCESSING</text>

  <rect x="120" y="293" width="170" height="32" rx="5" fill="#1a1a2e" stroke="#444468" stroke-width="1"/>
  <text x="205" y="308" text-anchor="middle" fill="#a0a0c0" font-family="Segoe UI,Arial,sans-serif" font-size="9">parse_script_sections()</text>
  <text x="205" y="320" text-anchor="middle" fill="#808098" font-family="Segoe UI,Arial,sans-serif" font-size="8">Headers → ScriptSection</text>

  <rect x="310" y="293" width="155" height="32" rx="5" fill="#1a1a2e" stroke="#444468" stroke-width="1"/>
  <text x="387" y="308" text-anchor="middle" fill="#a0a0c0" font-family="Segoe UI,Arial,sans-serif" font-size="9">estimate_duration()</text>
  <text x="387" y="320" text-anchor="middle" fill="#808098" font-family="Segoe UI,Arial,sans-serif" font-size="8">150 WPM calculation</text>

  <rect x="485" y="293" width="195" height="32" rx="5" fill="#1a1a2e" stroke="#444468" stroke-width="1"/>
  <text x="582" y="308" text-anchor="middle" fill="#a0a0c0" font-family="Segoe UI,Arial,sans-serif" font-size="9">export_teleprompter()</text>
  <text x="582" y="320" text-anchor="middle" fill="#808098" font-family="Segoe UI,Arial,sans-serif" font-size="8">Clean text without B-roll</text>

  <!-- Vertical connector Row2 → Row3 -->
  <line x1="400" y1="230" x2="400" y2="262" stroke="#7209b7" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Ollama bar at bottom -->
  <rect x="200" y="358" width="400" height="32" rx="6" fill="url(#accent)" filter="url(#shadow)"/>
  <text x="400" y="379" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🦙 Ollama · Gemma 4 · Local LLM Inference</text>

  <!-- Connector Row3 → Ollama -->
  <line x1="400" y1="337" x2="400" y2="358" stroke="#7209b7" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Video Styles sidebar -->
  <rect x="725" y="150" width="65" height="187" rx="6" fill="#1e1e3a" stroke="#533483" stroke-width="1"/>
  <text x="757" y="168" text-anchor="middle" fill="#7209b7" font-family="Segoe UI,Arial,sans-serif" font-size="8" font-weight="bold">STYLES</text>
  <text x="757" y="184" text-anchor="middle" fill="#a0a0c0" font-family="Segoe UI,Arial,sans-serif" font-size="7">Educational</text>
  <text x="757" y="198" text-anchor="middle" fill="#a0a0c0" font-family="Segoe UI,Arial,sans-serif" font-size="7">Entertain</text>
  <text x="757" y="212" text-anchor="middle" fill="#a0a0c0" font-family="Segoe UI,Arial,sans-serif" font-size="7">Tutorial</text>
  <text x="757" y="226" text-anchor="middle" fill="#a0a0c0" font-family="Segoe UI,Arial,sans-serif" font-size="7">Review</text>
  <text x="757" y="240" text-anchor="middle" fill="#a0a0c0" font-family="Segoe UI,Arial,sans-serif" font-size="7">Vlog</text>
  <text x="757" y="254" text-anchor="middle" fill="#a0a0c0" font-family="Segoe UI,Arial,sans-serif" font-size="7">Documen.</text>

  <!-- Connector to styles -->
  <line x1="700" y1="190" x2="725" y2="190" stroke="#533483" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7209b7"/>
    </marker>
  </defs>
</svg>
