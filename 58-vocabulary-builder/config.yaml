# Vocabulary Builder Configuration
# ----------------------------------

app:
  name: "Vocabulary Builder"
  version: "1.0.0"
  log_level: "INFO"

llm:
  model: "llama3"
  temperature: 0.7
  max_tokens: 8192
  base_url: "http://localhost:11434"

spaced_repetition:
  initial_interval: 1
  easy_bonus: 1.3
  graduating_interval: 6

quiz:
  default_count: 10
  pass_threshold: 80

streamlit:
  page_title: "📖 Vocabulary Builder"
  layout: "wide"
