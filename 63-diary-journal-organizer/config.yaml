app:
  name: "Diary Journal Organizer"
  version: "1.0.0"
  log_level: "INFO"
  data_dir: "./data"

diary:
  moods:
    - happy
    - sad
    - anxious
    - calm
    - excited
    - angry
    - grateful
    - tired
    - nostalgic
    - inspired
    - peaceful
    - loved
    - proud
    - confused
    - hopeful
    - creative
  default_period: "week"
  entries_per_page: 10
  enable_encryption: false

llm:
  model: "llama3"
  temperature: 0.6
  system_prompt: "You are a compassionate journal therapist."
