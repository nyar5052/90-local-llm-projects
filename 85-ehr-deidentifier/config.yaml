# EHR De-Identifier Configuration
# ⚠️ This tool is for EDUCATIONAL and RESEARCH purposes ONLY.
# It is NOT certified for HIPAA compliance.

model: "gemma4"
temperature: 0.1
max_tokens: 4096
log_level: "INFO"
ollama_url: "http://localhost:11434"

# PII Detection Rules
pii_rules:
  ssn: true
  phone: true
  email: true
  date_numeric: true
  date_text: true
  mrn: true
  ip_address: true
  url: true
  zip_code: true

# Audit settings
audit:
  enabled: true
  auto_export: false
  export_path: "audit_log.json"

# ⛔ HIPAA compliance notice
# This tool is NOT certified for HIPAA compliance.
# Do NOT use on real patient data.
hipaa_notice: "This tool is NOT certified for HIPAA compliance"
