# News Digest Generator Configuration
llm:
  model: gemma4
  temperature: 0.4
  max_tokens: 4096

digest:
  default_topics: 5
  formats:
    - daily
    - weekly
  default_format: daily
  categories:
    - Technology
    - Business
    - Politics
    - Science
    - Sports
    - Health
    - Entertainment
    - World
  enable_sentiment: true
  enable_trends: true
