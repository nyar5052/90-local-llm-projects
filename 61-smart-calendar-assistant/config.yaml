app:
  name: "Smart Calendar Assistant"
  version: "1.0.0"
  log_level: "INFO"
  data_dir: "./data"

calendar:
  default_timezone: "UTC"
  working_hours:
    start: "09:00"
    end: "17:00"
  break_duration_minutes: 15
  min_meeting_gap_minutes: 10
  priority_levels:
    critical: 5
    high: 4
    medium: 3
    low: 2
    optional: 1

llm:
  model: "llama3"
  temperature: 0.6
  system_prompt: "You are an expert calendar and productivity assistant."
