llm:
  model: "llama3.2"
  temperature: 0.4
  max_tokens: 2000

platforms:
  - homeassistant
  - ifttt
  - smartthings
  - openhab
  - nodered

default_platform: "homeassistant"
rules_file: "automation_rules.json"
templates_dir: "templates"

logging:
  level: "INFO"
  file: "home_automation.log"

scheduling:
  enabled: false
  cron_format: true
