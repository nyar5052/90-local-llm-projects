# Flashcard Creator Configuration
llm:
  temperature: 0.7
  max_tokens: 4096

flashcards:
  default_count: 10
  default_difficulty: "medium"
  max_cards_per_deck: 500

spaced_repetition:
  algorithm: "sm2"
  initial_ease_factor: 2.5
  minimum_ease_factor: 1.3
  initial_interval: 1
  graduating_interval: 6

storage:
  decks_dir: "./decks"
  stats_file: "review_stats.json"

logging:
  level: "INFO"
  file: "flashcard_creator.log"
