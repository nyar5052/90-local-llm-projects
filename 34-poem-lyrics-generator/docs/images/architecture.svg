<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ff8c5a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <rect x="0" y="392" width="800" height="8" fill="url(#accentBar)"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#ff6b35" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="bold">ARCHITECTURE OVERVIEW</text>

  <!-- Box 1: User Input -->
  <rect x="30" y="50" width="130" height="70" rx="8" fill="#1e2a45" stroke="#ff6b35" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="95" y="75" text-anchor="middle" fill="#ff6b35" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">User Input</text>
  <text x="95" y="93" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Theme, Style</text>
  <text x="95" y="107" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Mood, Title</text>

  <!-- Arrow 1→2 -->
  <line x1="160" y1="85" x2="185" y2="85" stroke="#ff6b35" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff6b35"/>
    </marker>
  </defs>

  <!-- Box 2: CLI / Web UI -->
  <rect x="190" y="50" width="120" height="70" rx="8" fill="#1e2a45" stroke="#ff6b35" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="250" y="75" text-anchor="middle" fill="#ff6b35" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">CLI / Web UI</text>
  <text x="250" y="93" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">cli.py (Click)</text>
  <text x="250" y="107" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">web_ui.py (Streamlit)</text>

  <!-- Arrow 2→3 -->
  <line x1="310" y1="85" x2="335" y2="85" stroke="#ff6b35" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 3: Generation Engine -->
  <rect x="340" y="45" width="145" height="80" rx="8" fill="#1e2a45" stroke="#ff6b35" stroke-width="2" filter="url(#shadow)"/>
  <text x="412" y="67" text-anchor="middle" fill="#ff6b35" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">Generation Engine</text>
  <text x="412" y="84" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">generate_poem()</text>
  <text x="412" y="97" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">generate_with_rhyme_scheme()</text>
  <text x="412" y="110" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">mix_styles()</text>

  <!-- Arrow 3→4 -->
  <line x1="485" y1="85" x2="510" y2="85" stroke="#ff6b35" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 4: Analysis -->
  <rect x="515" y="45" width="135" height="80" rx="8" fill="#1e2a45" stroke="#ff6b35" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="582" y="67" text-anchor="middle" fill="#ff6b35" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">Analysis</text>
  <text x="582" y="84" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">count_syllables()</text>
  <text x="582" y="97" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">detect_rhyme_scheme()</text>
  <text x="582" y="110" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">analyze_poem()</text>

  <!-- Arrow 4→5 -->
  <line x1="650" y1="85" x2="675" y2="85" stroke="#ff6b35" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 5: Formatting -->
  <rect x="680" y="50" width="100" height="70" rx="8" fill="#1e2a45" stroke="#ff6b35" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="75" text-anchor="middle" fill="#ff6b35" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">Formatting</text>
  <text x="730" y="93" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">format_poem()</text>
  <text x="730" y="107" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">per style rules</text>

  <!-- Arrow down from Formatting to Collections -->
  <line x1="730" y1="120" x2="730" y2="155" stroke="#ff6b35" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 6: Collections -->
  <rect x="655" y="160" width="130" height="65" rx="8" fill="#1e2a45" stroke="#ff6b35" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="720" y="183" text-anchor="middle" fill="#ff6b35" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">Collections</text>
  <text x="720" y="200" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">manage_collection()</text>
  <text x="720" y="213" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">JSON storage</text>

  <!-- Ollama Box at bottom center -->
  <rect x="280" y="290" width="240" height="65" rx="8" fill="#2a1a35" stroke="#533483" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="315" text-anchor="middle" fill="#533483" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">🦙 Ollama (Local LLM)</text>
  <text x="400" y="335" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Gemma 4 · localhost:11434</text>
  <text x="400" y="348" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">HTTP API · Streaming Responses</text>

  <!-- Arrow from Generation Engine down to Ollama -->
  <line x1="412" y1="125" x2="412" y2="175" stroke="#533483" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="412" y1="175" x2="412" y2="285" stroke="#533483" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>
  <defs>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#533483"/>
    </marker>
  </defs>
  <!-- Label on the dashed line -->
  <text x="425" y="220" fill="#7a5fa0" font-family="Segoe UI,Arial,sans-serif" font-size="9" font-style="italic">LLM requests</text>

  <!-- Style Instructions side box -->
  <rect x="30" y="155" width="160" height="120" rx="8" fill="#1e2a45" stroke="#ff6b35" stroke-width="1" stroke-dasharray="4,3" filter="url(#shadow)"/>
  <text x="110" y="177" text-anchor="middle" fill="#ff6b35" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">Style Instructions</text>
  <text x="110" y="196" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">Haiku → 5-7-5 syllables</text>
  <text x="110" y="210" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">Sonnet → 14 lines ABAB</text>
  <text x="110" y="224" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">Limerick → 5 lines AABBA</text>
  <text x="110" y="238" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">Rap → Verse + Chorus</text>
  <text x="110" y="252" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">Ballad · Free-verse · Acrostic</text>

  <!-- Dashed line from Style Instructions to Generation Engine -->
  <line x1="190" y1="200" x2="340" y2="110" stroke="#ff6b35" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>

  <!-- Data flow labels -->
  <rect x="280" y="370" width="240" height="20" rx="4" fill="none"/>
  <text x="400" y="385" text-anchor="middle" fill="#555570" font-family="Segoe UI,Arial,sans-serif" font-size="10">── data flow    - - - LLM / config</text>
</svg>
