<svg xmlns="http://www.w3.org/2000/svg" width="800" height="350" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#bg)" rx="12"/>
  <rect x="0" y="343" width="800" height="7" fill="url(#accentBar)"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#ff6b35" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="bold">FEATURES AT A GLANCE</text>

  <!-- Row 1 -->
  <!-- Card 1: 7 Poetic Styles -->
  <rect x="30" y="50" width="235" height="120" rx="8" fill="#1e2a45" stroke="#ff6b35" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="48" y="77" fill="#ff6b35" font-family="Segoe UI,Arial,sans-serif" font-size="22">🎭</text>
  <text x="78" y="77" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">7 Poetic Styles</text>
  <text x="48" y="98" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Haiku · Sonnet · Free-verse</text>
  <text x="48" y="114" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Limerick · Rap · Ballad</text>
  <text x="48" y="130" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Acrostic</text>
  <text x="48" y="152" fill="#555570" font-family="Segoe UI,Arial,sans-serif" font-size="9" font-style="italic">Each with precise poetic rules</text>

  <!-- Card 2: Rhyme Scheme Detection -->
  <rect x="283" y="50" width="235" height="120" rx="8" fill="#1e2a45" stroke="#ff6b35" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="301" y="77" fill="#ff6b35" font-family="Segoe UI,Arial,sans-serif" font-size="22">🔤</text>
  <text x="331" y="77" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">Rhyme Detection</text>
  <text x="301" y="98" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Phonetic ending analysis</text>
  <text x="301" y="114" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">ABAB, AABB, ABCABC pattern</text>
  <text x="301" y="130" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">detection via _words_rhyme()</text>
  <text x="301" y="152" fill="#555570" font-family="Segoe UI,Arial,sans-serif" font-size="9" font-style="italic">_get_phonetic_ending() heuristic</text>

  <!-- Card 3: Style Mixing -->
  <rect x="536" y="50" width="235" height="120" rx="8" fill="#1e2a45" stroke="#ff6b35" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="554" y="77" fill="#ff6b35" font-family="Segoe UI,Arial,sans-serif" font-size="22">🎨</text>
  <text x="584" y="77" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">Style Mixing</text>
  <text x="554" y="98" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Blend two poetic styles into</text>
  <text x="554" y="114" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">one unique poem via</text>
  <text x="554" y="130" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">mix_styles(theme, styles, mood)</text>
  <text x="554" y="152" fill="#555570" font-family="Segoe UI,Arial,sans-serif" font-size="9" font-style="italic">e.g. haiku + rap = haiku-rap</text>

  <!-- Row 2 -->
  <!-- Card 4: Syllable Counter -->
  <rect x="30" y="190" width="235" height="120" rx="8" fill="#1e2a45" stroke="#ff6b35" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="48" y="217" fill="#ff6b35" font-family="Segoe UI,Arial,sans-serif" font-size="22">📊</text>
  <text x="78" y="217" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">Syllable Counter</text>
  <text x="48" y="238" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Vowel-cluster heuristic</text>
  <text x="48" y="254" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">counts syllables per line</text>
  <text x="48" y="270" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">count_syllables(text)</text>
  <text x="48" y="292" fill="#555570" font-family="Segoe UI,Arial,sans-serif" font-size="9" font-style="italic">Verify haiku 5-7-5 conformance</text>

  <!-- Card 5: Poem Collections -->
  <rect x="283" y="190" width="235" height="120" rx="8" fill="#1e2a45" stroke="#ff6b35" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="301" y="217" fill="#ff6b35" font-family="Segoe UI,Arial,sans-serif" font-size="22">📚</text>
  <text x="331" y="217" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">Poem Collections</text>
  <text x="301" y="238" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Save, browse, and remove</text>
  <text x="301" y="254" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">poems in named collections</text>
  <text x="301" y="270" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">stored as JSON files</text>
  <text x="301" y="292" fill="#555570" font-family="Segoe UI,Arial,sans-serif" font-size="9" font-style="italic">manage_collection(name, action, poem)</text>

  <!-- Card 6: Smart Formatting -->
  <rect x="536" y="190" width="235" height="120" rx="8" fill="#1e2a45" stroke="#ff6b35" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="554" y="217" fill="#ff6b35" font-family="Segoe UI,Arial,sans-serif" font-size="22">✨</text>
  <text x="584" y="217" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">Smart Formatting</text>
  <text x="554" y="238" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Style-specific indentation</text>
  <text x="554" y="254" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">and stanza breaks via</text>
  <text x="554" y="270" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">format_poem(text, style)</text>
  <text x="554" y="292" fill="#555570" font-family="Segoe UI,Arial,sans-serif" font-size="9" font-style="italic">Sonnet: 4-4-4-2 · Haiku: centered</text>
</svg>
