# Textbook Summarizer Configuration
llm:
  model: gemma4
  temperature: 0.4
  max_tokens: 4096

summarizer:
  styles:
    - concise
    - detailed
    - study-guide
  default_style: concise
  max_chapter_words: 50000
  generate_glossary: true
  generate_concept_map: true
  generate_study_questions: true
  num_study_questions: 5
