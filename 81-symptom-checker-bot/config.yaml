# Symptom Checker Bot Configuration
model: "gemma4"
temperature: 0.3
max_tokens: 1024
log_level: "INFO"
ollama_url: "http://localhost:11434"

# Urgency thresholds
urgency:
  enable_auto_assessment: true
  emergency_keywords_strict: true

# UI Settings
ui:
  theme: "medical"
  show_disclaimer: true
  show_history: true
