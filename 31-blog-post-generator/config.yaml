app:
  name: "Blog Post Generator"
  version: "2.0.0"
llm:
  model: "llama3"
  temperature: 0.7
  max_tokens: 2400
blog:
  default_tone: "professional"
  default_length: 800
  max_drafts: 5
  seo:
    min_keyword_density: 0.01
    max_keyword_density: 0.03
    min_word_count: 300
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
