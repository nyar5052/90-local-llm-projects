<svg xmlns="http://www.w3.org/2000/svg" width="800" height="350" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#bg)" rx="12"/>

  <!-- Row 1 -->

  <!-- Card 1: SEO Scoring Engine -->
  <rect x="30" y="25" width="235" height="140" rx="10" fill="#1e2a45" stroke="#e94560" stroke-width="1.5"/>
  <text x="147" y="55" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="22">🔍</text>
  <text x="147" y="78" text-anchor="middle" fill="#e94560" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">SEO Scoring Engine</text>
  <text x="147" y="98" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Automated 0–100 score with</text>
  <text x="147" y="113" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">4 weighted criteria: density,</text>
  <text x="147" y="128" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">headings, meta, length</text>
  <text x="147" y="150" text-anchor="middle" fill="#707090" font-family="Consolas,monospace" font-size="9">score_seo(content, keywords)</text>

  <!-- Card 2: 5 Writing Tones -->
  <rect x="283" y="25" width="235" height="140" rx="10" fill="#1e2a45" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="400" y="55" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="22">🎨</text>
  <text x="400" y="78" text-anchor="middle" fill="#4a9eff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">5 Writing Tones</text>
  <text x="400" y="98" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Professional · Casual</text>
  <text x="400" y="113" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Technical · Friendly</text>
  <text x="400" y="128" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Persuasive</text>
  <text x="400" y="150" text-anchor="middle" fill="#707090" font-family="Consolas,monospace" font-size="9">TONES = ["professional", ...]</text>

  <!-- Card 3: Multi-Draft Generation -->
  <rect x="536" y="25" width="235" height="140" rx="10" fill="#1e2a45" stroke="#6bcb77" stroke-width="1.5"/>
  <text x="653" y="55" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="22">📄</text>
  <text x="653" y="78" text-anchor="middle" fill="#6bcb77" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Multi-Draft Generation</text>
  <text x="653" y="98" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Generate up to 5 drafts with</text>
  <text x="653" y="113" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">varying temperature for</text>
  <text x="653" y="128" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">creative diversity</text>
  <text x="653" y="150" text-anchor="middle" fill="#707090" font-family="Consolas,monospace" font-size="9">generate_multiple_drafts()</text>

  <!-- Row 2 -->

  <!-- Card 4: Outline Preview -->
  <rect x="30" y="185" width="235" height="140" rx="10" fill="#1e2a45" stroke="#ffd93d" stroke-width="1.5"/>
  <text x="147" y="215" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="22">📋</text>
  <text x="147" y="238" text-anchor="middle" fill="#ffd93d" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Outline Preview</text>
  <text x="147" y="258" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Preview the structure of</text>
  <text x="147" y="273" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">your blog post before</text>
  <text x="147" y="288" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">committing to full generation</text>
  <text x="147" y="310" text-anchor="middle" fill="#707090" font-family="Consolas,monospace" font-size="9">generate_outline(topic, ...)</text>

  <!-- Card 5: Tone Analysis -->
  <rect x="283" y="185" width="235" height="140" rx="10" fill="#1e2a45" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="400" y="215" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="22">🎭</text>
  <text x="400" y="238" text-anchor="middle" fill="#ff6b6b" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Tone Analysis</text>
  <text x="400" y="258" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Heuristic word-marker</text>
  <text x="400" y="273" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">analysis across all 5 tones</text>
  <text x="400" y="288" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">with visual bar charts</text>
  <text x="400" y="310" text-anchor="middle" fill="#707090" font-family="Consolas,monospace" font-size="9">analyze_tone(content)</text>

  <!-- Card 6: Markdown Export -->
  <rect x="536" y="185" width="235" height="140" rx="10" fill="#1e2a45" stroke="#533483" stroke-width="1.5"/>
  <text x="653" y="215" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="22">💾</text>
  <text x="653" y="238" text-anchor="middle" fill="#533483" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Markdown Export</text>
  <text x="653" y="258" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Export with YAML frontmatter</text>
  <text x="653" y="273" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">including title, date,</text>
  <text x="653" y="288" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">keywords, and SEO score</text>
  <text x="653" y="310" text-anchor="middle" fill="#707090" font-family="Consolas,monospace" font-size="9">export_markdown(content, ...)</text>
</svg>
