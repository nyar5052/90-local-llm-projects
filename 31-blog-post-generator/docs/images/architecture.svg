<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="bold">System Architecture</text>

  <!-- User Input Box -->
  <rect x="270" y="42" width="260" height="40" rx="8" fill="#1e2a45" stroke="#e94560" stroke-width="1.5"/>
  <text x="400" y="58" text-anchor="middle" fill="#e94560" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">👤 User Input</text>
  <text x="400" y="74" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Topic · Keywords · Tone · Length</text>

  <!-- Arrow from User Input to CLI -->
  <line x1="350" y1="82" x2="190" y2="105" stroke="#e94560" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Arrow from User Input to Web UI -->
  <line x1="450" y1="82" x2="610" y2="105" stroke="#e94560" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- CLI Box -->
  <rect x="80" y="105" width="220" height="70" rx="8" fill="#1e2a45" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="190" y="125" text-anchor="middle" fill="#4a9eff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">⌨️ CLI (Click)</text>
  <text x="190" y="143" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">cli.py</text>
  <text x="190" y="158" text-anchor="middle" fill="#707090" font-family="Segoe UI,Arial,sans-serif" font-size="9">Rich panels · Spinners · Tables</text>
  <text x="190" y="170" text-anchor="middle" fill="#707090" font-family="Segoe UI,Arial,sans-serif" font-size="9">--topic --tone --drafts --seo-report</text>

  <!-- Web UI Box -->
  <rect x="500" y="105" width="220" height="70" rx="8" fill="#1e2a45" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="610" y="125" text-anchor="middle" fill="#ff6b6b" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">🌐 Web UI (Streamlit)</text>
  <text x="610" y="143" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">web_ui.py</text>
  <text x="610" y="158" text-anchor="middle" fill="#707090" font-family="Segoe UI,Arial,sans-serif" font-size="9">Dashboard · Tabs · Progress bars</text>
  <text x="610" y="170" text-anchor="middle" fill="#707090" font-family="Segoe UI,Arial,sans-serif" font-size="9">History sidebar · Download buttons</text>

  <!-- Arrows from CLI/Web to Core Engine -->
  <line x1="190" y1="175" x2="250" y2="210" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="610" y1="175" x2="550" y2="210" stroke="#ff6b6b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Core Engine Box -->
  <rect x="180" y="205" width="440" height="75" rx="8" fill="#1e2a45" stroke="#e94560" stroke-width="2"/>
  <text x="400" y="225" text-anchor="middle" fill="#e94560" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">⚙️ Core Engine — core.py</text>
  <text x="290" y="245" text-anchor="middle" fill="#c0c0d0" font-family="Consolas,monospace" font-size="10">build_prompt()</text>
  <text x="510" y="245" text-anchor="middle" fill="#c0c0d0" font-family="Consolas,monospace" font-size="10">generate_blog_post()</text>
  <text x="290" y="263" text-anchor="middle" fill="#c0c0d0" font-family="Consolas,monospace" font-size="10">generate_outline()</text>
  <text x="510" y="263" text-anchor="middle" fill="#c0c0d0" font-family="Consolas,monospace" font-size="10">generate_multiple_drafts()</text>

  <!-- Arrow from Core to Analysis -->
  <line x1="300" y1="280" x2="200" y2="305" stroke="#e94560" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Arrow from Core to Export -->
  <line x1="500" y1="280" x2="600" y2="305" stroke="#e94560" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Analysis Box -->
  <rect x="70" y="300" width="260" height="55" rx="8" fill="#1e2a45" stroke="#ffd93d" stroke-width="1.5"/>
  <text x="200" y="320" text-anchor="middle" fill="#ffd93d" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">📊 Analysis</text>
  <text x="200" y="338" text-anchor="middle" fill="#c0c0d0" font-family="Consolas,monospace" font-size="10">score_seo() · analyze_tone()</text>
  <text x="200" y="350" text-anchor="middle" fill="#707090" font-family="Segoe UI,Arial,sans-serif" font-size="9">0-100 SEO score · 5-tone heuristics</text>

  <!-- Export Box -->
  <rect x="470" y="300" width="260" height="55" rx="8" fill="#1e2a45" stroke="#6bcb77" stroke-width="1.5"/>
  <text x="600" y="320" text-anchor="middle" fill="#6bcb77" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">💾 Export</text>
  <text x="600" y="338" text-anchor="middle" fill="#c0c0d0" font-family="Consolas,monospace" font-size="10">export_markdown() · parse_blog_post()</text>
  <text x="600" y="350" text-anchor="middle" fill="#707090" font-family="Segoe UI,Arial,sans-serif" font-size="9">YAML frontmatter · BlogPost dataclass</text>

  <!-- Arrow from Core Engine down to Ollama -->
  <line x1="400" y1="280" x2="400" y2="355" stroke="#e94560" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Ollama LLM Box -->
  <rect x="320" y="360" width="160" height="32" rx="8" fill="#e94560" stroke="none"/>
  <text x="400" y="381" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🦙 Ollama LLM Service</text>

  <!-- Config Box on the side -->
  <rect x="660" y="215" width="120" height="55" rx="8" fill="#1e2a45" stroke="#533483" stroke-width="1.5"/>
  <text x="720" y="235" text-anchor="middle" fill="#533483" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">📄 config.yaml</text>
  <text x="720" y="250" text-anchor="middle" fill="#707090" font-family="Segoe UI,Arial,sans-serif" font-size="9">model · temperature</text>
  <text x="720" y="262" text-anchor="middle" fill="#707090" font-family="Segoe UI,Arial,sans-serif" font-size="9">max_tokens · SEO</text>

  <!-- Arrow from Config to Core -->
  <line x1="660" y1="242" x2="625" y2="242" stroke="#533483" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>
</svg>
