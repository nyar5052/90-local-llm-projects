<svg xmlns="http://www.w3.org/2000/svg" width="800" height="350" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#00b4d8" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="bold">KEY FEATURES</text>

  <!-- ===== Card 1: Multi-Platform Support ===== -->
  <rect x="30" y="50" width="235" height="120" rx="10" fill="#12192d" stroke="#00b4d8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="50" y="78" fill="#00b4d8" font-family="Segoe UI,Arial,sans-serif" font-size="22">🌐</text>
  <text x="80" y="78" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Multi-Platform</text>
  <line x1="45" y1="88" x2="250" y2="88" stroke="#00b4d8" stroke-width="0.5" opacity="0.4"/>
  <text x="50" y="108" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Twitter/X · LinkedIn · Instagram</text>
  <text x="50" y="125" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Platform-specific char limits</text>
  <text x="50" y="142" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">and formatting conventions</text>
  <text x="50" y="159" fill="#00b4d8" font-family="Segoe UI,Arial,sans-serif" font-size="10">280 · 3000 · 2200 chars</text>

  <!-- ===== Card 2: A/B Testing Engine ===== -->
  <rect x="283" y="50" width="235" height="120" rx="10" fill="#12192d" stroke="#00b4d8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="303" y="78" fill="#00b4d8" font-family="Segoe UI,Arial,sans-serif" font-size="22">🔬</text>
  <text x="333" y="78" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">A/B Testing Engine</text>
  <line x1="298" y1="88" x2="503" y2="88" stroke="#00b4d8" stroke-width="0.5" opacity="0.4"/>
  <text x="303" y="108" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Question-based hooks</text>
  <text x="303" y="125" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Statement · Story-based</text>
  <text x="303" y="142" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Data-driven approaches</text>
  <text x="303" y="159" fill="#00b4d8" font-family="Segoe UI,Arial,sans-serif" font-size="10">generate_ab_variants()</text>

  <!-- ===== Card 3: Smart Hashtag Generator ===== -->
  <rect x="536" y="50" width="235" height="120" rx="10" fill="#12192d" stroke="#00b4d8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="556" y="78" fill="#00b4d8" font-family="Segoe UI,Arial,sans-serif" font-size="22">#️⃣</text>
  <text x="586" y="78" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Smart Hashtags</text>
  <line x1="551" y1="88" x2="756" y2="88" stroke="#00b4d8" stroke-width="0.5" opacity="0.4"/>
  <text x="556" y="108" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">AI-generated hashtags</text>
  <text x="556" y="125" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Platform-aware counts</text>
  <text x="556" y="142" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Twitter: 3 · LinkedIn: 5</text>
  <text x="556" y="159" fill="#00b4d8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Instagram: up to 15 tags</text>

  <!-- ===== Card 4: Character Validation ===== -->
  <rect x="30" y="190" width="235" height="120" rx="10" fill="#12192d" stroke="#00b4d8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="50" y="218" fill="#00b4d8" font-family="Segoe UI,Arial,sans-serif" font-size="22">✅</text>
  <text x="80" y="218" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Char Validation</text>
  <line x1="45" y1="228" x2="250" y2="228" stroke="#00b4d8" stroke-width="0.5" opacity="0.4"/>
  <text x="50" y="248" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Real-time limit checking</text>
  <text x="50" y="265" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Estimated reach scoring</text>
  <text x="50" y="282" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">validate_char_count() returns</text>
  <text x="50" y="299" fill="#00b4d8" font-family="Segoe UI,Arial,sans-serif" font-size="10">(is_valid, char_count, limit)</text>

  <!-- ===== Card 5: Post Scheduling ===== -->
  <rect x="283" y="190" width="235" height="120" rx="10" fill="#12192d" stroke="#00b4d8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="303" y="218" fill="#00b4d8" font-family="Segoe UI,Arial,sans-serif" font-size="22">📅</text>
  <text x="333" y="218" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Post Scheduling</text>
  <line x1="298" y1="228" x2="503" y2="228" stroke="#00b4d8" stroke-width="0.5" opacity="0.4"/>
  <text x="303" y="248" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Best posting times</text>
  <text x="303" y="265" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">per platform from config</text>
  <text x="303" y="282" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">suggest_schedule() helper</text>
  <text x="303" y="299" fill="#00b4d8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Morning · Noon · Evening</text>

  <!-- ===== Card 6: Platform Formatting ===== -->
  <rect x="536" y="190" width="235" height="120" rx="10" fill="#12192d" stroke="#00b4d8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="556" y="218" fill="#00b4d8" font-family="Segoe UI,Arial,sans-serif" font-size="22">🎨</text>
  <text x="586" y="218" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">Platform Formatting</text>
  <line x1="551" y1="228" x2="756" y2="228" stroke="#00b4d8" stroke-width="0.5" opacity="0.4"/>
  <text x="556" y="248" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Twitter: compact inline</text>
  <text x="556" y="265" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">LinkedIn: paragraph breaks</text>
  <text x="556" y="282" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11">Instagram: emoji + hashtag</text>
  <text x="556" y="299" fill="#00b4d8" font-family="Segoe UI,Arial,sans-serif" font-size="10">format_for_platform()</text>

  <!-- Bottom accent bar -->
  <rect x="100" y="330" width="600" height="4" rx="2" fill="#00b4d8" opacity="0.5"/>
</svg>
